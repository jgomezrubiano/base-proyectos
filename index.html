<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
/* runs before first paint — no flash */
(function(){ var t=localStorage.getItem('hlna_home_theme'); if(t==='dark') document.documentElement.setAttribute('data-theme','dark'); })();
</script>
<title>Data Dept — Home Base</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=JetBrains+Mono:wght@400;500;600&display=swap');

  :root{
    /* ── base palette (light / default) ── */
    --bg: #f5f4f1;
    --card: #ffffff;
    --border: #e8e6e1;
    --border-soft: #f0ede8;
    --text: #14161a;
    --text-2: #6b6f76;
    --text-muted: #9a9da3;
    /* ── accent colors ── */
    --teal: #1b7a6b;
    --red: #d9542f;
    --gold: #d1a02e;
    --purple: #6b5fa8;
    --grey: #9a9da3;
    /* ── derived tints (replace all hardcoded rgba/hex in the sheet) ── */
    --teal-dim: #175f56;
    --hover-bg: #faf9f7;
    --teal-a5:  rgba(27,122,107,0.05);
    --teal-a7:  rgba(27,122,107,0.07);
    --teal-a10: rgba(27,122,107,0.10);
    --teal-a15: rgba(27,122,107,0.15);
    --teal-a25: rgba(27,122,107,0.25);
    --gold-a7:  rgba(209,160,46,0.07);
    --red-a7:   rgba(217,84,47,0.07);
    --red-a8:   rgba(217,84,47,0.08);
    --grey-a7:  rgba(154,157,163,0.07);
    --purple-a7:  rgba(107,95,168,0.07);
    --purple-a10: rgba(107,95,168,0.10);
  }

  [data-theme="dark"]{
    /* ── base palette (dark) ── */
    --bg: #262624;
    --card: #30302e;
    --border: #3a3a37;
    --border-soft: #353533;
    --text: #e5e2dc;
    --text-2: #b0aca3;
    --text-muted: #7a766d;
    /* ── accent colors (warm charcoal / terracotta scheme) ── */
    --teal: #d97757;
    --red: #c9756a;
    --gold: #d4a94f;
    --purple: #a894c4;
    --grey: #8a867d;
    /* ── derived tints ── */
    --teal-dim: #bf6040;
    --hover-bg: #373735;
    --teal-a5:  rgba(217,119,87,0.09);
    --teal-a7:  rgba(217,119,87,0.12);
    --teal-a10: rgba(217,119,87,0.16);
    --teal-a15: rgba(217,119,87,0.22);
    --teal-a25: rgba(217,119,87,0.22);
    --gold-a7:  rgba(212,169,79,0.11);
    --red-a7:   rgba(201,117,106,0.11);
    --red-a8:   rgba(201,117,106,0.13);
    --grey-a7:  rgba(138,134,125,0.11);
    --purple-a7:  rgba(168,148,196,0.11);
    --purple-a10: rgba(168,148,196,0.16);
  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html,body{
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  .wrap{
    max-width: 1180px;
    margin: 0 auto;
    padding: 52px 32px 100px;
  }

  /* ===== HEADER ===== */
  header{
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 40px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  .brand-eyebrow{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--teal);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
  }
  h1{
    font-size: 36px;
    font-weight: 800;
    letter-spacing: -1px;
    color: var(--text);
    line-height: 1.1;
  }
  .header-subtitle{
    margin-top: 6px;
    font-size: 15px;
    font-weight: 400;
    color: var(--text-2);
  }
  .header-right{
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text-2);
  }
  #liveClock{ color: var(--text); font-size: 13px; font-weight: 500; margin-bottom: 3px; }
  #lastSync{ color: var(--text-muted); font-size: 11px; }

  /* ===== STATUS STRIP ===== */
  .status-strip{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 36px;
  }
  .stat-cell{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 18px 20px;
  }
  .stat-num{
    font-family: 'JetBrains Mono', monospace;
    font-size: 28px;
    font-weight: 600;
    line-height: 1;
    margin-bottom: 6px;
  }
  .stat-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 1.5px;
  }
  .stat-cell.active   .stat-num{ color: var(--teal); }
  .stat-cell.blocked  .stat-num{ color: var(--red); }
  .stat-cell.paused   .stat-num{ color: var(--gold); }
  .stat-cell.archived .stat-num{ color: var(--grey); }

  /* ===== LOOSE BADGE (filter bar) ===== */
  .loose-badge{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--purple);
    background: var(--purple-a10);
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
    letter-spacing: 0.3px;
  }
  .loose-badge:empty{ display: none; }

  /* ===== FILTER BAR ===== */
  .filter-bar{
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
    align-items: center;
  }
  .filter-btn{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s ease;
    text-transform: uppercase;
  }
  .filter-btn:hover{ border-color: var(--teal); color: var(--teal); }
  .filter-btn.active{ background: var(--teal); border-color: var(--teal); color: #fff; }

  /* quick-capture lives between filters and search */
  .quick-capture-wrap{
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .quick-capture-btn{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.5px;
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--teal);
    cursor: pointer;
    transition: all .15s ease;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .quick-capture-btn:hover{ border-color: var(--teal); background: var(--teal-a5); }
  .quick-capture-input{
    width: 220px;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 7px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: transparent;
    outline: none;
    transition: border-color .15s ease;
  }
  .quick-capture-input:focus{ border-bottom-color: var(--teal); }
  .quick-capture-input::placeholder{ color: var(--text-muted); }
  .quick-capture-input.hidden{ display: none; }

  .search-input{
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 8px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--text);
    width: 200px;
    outline: none;
  }
  .search-input:focus{ border-color: var(--teal); }
  .search-input::placeholder{ color: var(--text-muted); }

  /* ===== SECTION LABEL ===== */
  .section-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin: 36px 0 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .section-label::after{
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  /* ===== PROJECT LIST ===== */
  .proj-list{
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    background: var(--card);
  }
  .proj-item{ border-bottom: 1px solid var(--border); }
  .proj-item:last-child{ border-bottom: none; }

  .proj-row{
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 20px;
    min-height: 68px;
    cursor: pointer;
    transition: background .12s ease;
    outline: none;
    user-select: none;
  }
  .proj-row:hover{ background: var(--hover-bg); }
  .proj-row:focus-visible{ outline: 2px solid var(--teal); outline-offset: -2px; }

  .row-dot{
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* ===== PROJECT ICON (replaces status dot on PROJECTS rows) ===== */
  .row-icon{
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 26px;
    height: 26px;
    border-radius: 7px;
    font-size: 15px;
    line-height: 1;
    flex-shrink: 0;
    border: 1.5px solid transparent;
    transition: border-color .12s ease, background .12s ease;
  }
  .row-icon.status-active  { border-color: var(--teal);  background: var(--teal-a7); }
  .row-icon.status-paused  { border-color: var(--gold);  background: var(--gold-a7); }
  .row-icon.status-blocked { border-color: var(--red);   background: var(--red-a7); }
  .row-icon.status-archived{ border-color: var(--grey);  background: var(--grey-a7); opacity: 0.55; }

  /* ===== ICON PICKER (new project form) ===== */
  .icon-picker-label{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    margin-bottom: 5px;
  }
  .icon-picker{
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
  }
  .icon-picker-btn{
    font-size: 17px;
    width: 34px;
    height: 34px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: 7px;
    border: 1.5px solid var(--border);
    background: none;
    cursor: pointer;
    transition: border-color .12s ease, background .12s ease;
  }
  .icon-picker-btn:hover{ border-color: var(--teal); background: var(--teal-a5); }
  .icon-picker-btn.selected{ border-color: var(--teal); background: var(--teal-a10); }
  .row-title-block{
    display: flex;
    flex-direction: column;
    gap: 3px;
    min-width: 0;
  }
  .row-title{
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .row-area{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
  }
  .row-area--loose{ color: var(--purple); }

  .row-spacer{ flex: 1; }

  .row-path{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    max-width: 280px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .row-copy-btn{
    background: none;
    border: none;
    padding: 4px 5px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    opacity: 0;
    transition: opacity .15s ease, background .12s ease;
    flex-shrink: 0;
    line-height: 1;
  }
  .proj-row:hover .row-copy-btn{ opacity: 1; }
  .row-copy-btn:hover{ background: var(--border-soft); color: var(--text-2); }

  .row-date{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
    width: 82px;
    text-align: right;
    flex-shrink: 0;
  }
  .row-chevron{
    color: var(--text-muted);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    transition: transform .2s ease;
    margin-left: 4px;
  }
  .proj-row.row--open .row-chevron{ transform: rotate(90deg); }

  /* ===== EXPANDED PANEL ===== */
  .proj-expand{
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows .25s ease;
  }
  .proj-expand.open{ grid-template-rows: 1fr; }
  .expand-inner{ overflow: hidden; min-height: 0; }
  .expand-content{
    padding: 16px 24px 24px 42px;
    border-top: 1px solid var(--border-soft);
  }
  .expand-note{
    font-size: 14px;
    color: var(--text-2);
    line-height: 1.6;
    margin-bottom: 20px;
  }

  /* ===== LOG TIMELINE ===== */
  .expand-log{ display: flex; flex-direction: column; }
  .log-entry{ display: flex; gap: 14px; }
  .log-spine{
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 14px;
    flex-shrink: 0;
    padding-top: 5px;
  }
  .log-dot{
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--teal);
    flex-shrink: 0;
  }
  .log-entry--older .log-dot{ background: transparent; border: 1.5px solid var(--border); }
  .log-line{
    width: 1px;
    flex: 1;
    min-height: 12px;
    background: var(--border);
    margin-top: 4px;
  }
  .log-body{ padding-bottom: 16px; flex: 1; min-width: 0; }
  .log-entry:last-child .log-body{ padding-bottom: 0; }
  .log-date{
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-muted);
    display: block;
    margin-bottom: 4px;
  }
  .log-text{ font-size: 13px; color: var(--text-2); line-height: 1.55; }
  .log-pre{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11.5px;
    line-height: 1.6;
    color: var(--text-2);
    background: var(--hover-bg);
    border: 1px solid var(--border-soft);
    border-radius: 6px;
    padding: 10px 12px;
    margin-top: 6px;
    white-space: pre-wrap;
    overflow-x: auto;
    display: block;
  }
  .log-entry--older .log-text{ font-size: 12.5px; color: var(--text-muted); }

  /* ===== NEWEST LOG ENTRY EMPHASIS ===== */
  .log-entry--newest .log-text{ font-size: 14px; color: var(--text); font-weight: 500; }
  .log-entry--newest .log-dot{ width: 9px; height: 9px; }

  /* ===== DRAFT NOTE INTERACTION ===== */
  .log-text--done{ text-decoration: line-through; color: var(--text-muted) !important; font-weight: 400 !important; }
  .log-draft-row .log-text:not(.log-text--done){ color: var(--text); }
  .standalone-draft-row .expand-note:not(.log-text--done){ color: var(--text); }
  .log-draft-row{
    display: flex;
    align-items: flex-start;
    gap: 6px;
  }
  .log-draft-row .log-text{
    flex: 1;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 3px;
    margin: -1px -3px;
    transition: background .1s ease;
  }
  .log-draft-row .log-text:hover{ background: var(--purple-a7); }
  .log-entry .log-pre{ font-size: 11.5px; border-radius: 6px; font-weight: 400; }
  .standalone-draft-row{
    display: flex;
    align-items: flex-start;
    gap: 6px;
    margin-bottom: 20px;
  }
  .standalone-draft-row .expand-note{
    flex: 1;
    cursor: pointer;
    border-radius: 3px;
    padding: 1px 3px;
    margin: -1px -3px 0;
    transition: background .1s ease;
  }
  .standalone-draft-row .expand-note:hover{ background: var(--purple-a7); }
  .log-note-delete-btn{
    background: none;
    border: none;
    padding: 2px 3px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    border-radius: 3px;
    opacity: 0;
    transition: opacity .15s ease, color .1s ease;
    flex-shrink: 0;
    margin-top: 1px;
    line-height: 1;
  }
  .log-entry:hover .log-note-delete-btn,
  .standalone-draft-row:hover .log-note-delete-btn{ opacity: 1; }
  .log-note-delete-btn:hover{ color: var(--red); }

  /* ===== INLINE NOTE EDIT ===== */
  .log-edit-btn{
    background: none;
    border: none;
    padding: 2px 3px;
    cursor: pointer;
    color: var(--text-muted);
    display: flex;
    align-items: center;
    border-radius: 3px;
    opacity: 0;
    transition: opacity .15s ease, color .1s ease;
    flex-shrink: 0;
    margin-top: 1px;
    line-height: 1;
  }
  .log-entry:hover .log-edit-btn,
  .standalone-draft-row:hover .log-edit-btn{ opacity: 1; }
  .log-edit-btn:hover{ color: var(--teal); }

  .log-edit-input{
    flex: 1;
    border: none;
    border-bottom: 1px solid var(--teal);
    padding: 2px 4px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: transparent;
    outline: none;
    min-width: 0;
  }
  .log-edit-save-btn,
  .log-edit-cancel-btn{
    background: none;
    border: none;
    padding: 2px 6px;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    border-radius: 3px;
    flex-shrink: 0;
    line-height: 1;
    transition: color .1s ease, background .1s ease;
  }
  .log-edit-save-btn{ color: var(--teal); }
  .log-edit-save-btn:hover{ background: var(--teal-a10); }
  .log-edit-cancel-btn{ color: var(--text-muted); }
  .log-edit-cancel-btn:hover{ color: var(--red); background: var(--red-a8); }

  /* ===== DRAFT PILL ===== */
  .draft-tag{
    display: inline-flex;
    align-items: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--purple);
    background: var(--purple-a10);
    padding: 2px 6px;
    border-radius: 8px;
    margin-left: 6px;
    vertical-align: middle;
  }

  /* ===== PER-PROJECT QUICK-ADD ===== */
  .quick-add-wrap{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 14px;
    padding-top: 14px;
    border-top: 1px solid var(--border-soft);
    flex-wrap: wrap;
  }
  .quick-add-input{
    flex: 1;
    border: none;
    border-bottom: 1px solid var(--border);
    padding: 6px 0;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--text);
    background: transparent;
    outline: none;
    transition: border-color .15s ease;
  }
  .quick-add-input:focus{ border-bottom-color: var(--teal); }
  .quick-add-input::placeholder{ color: var(--text-muted); }
  .quick-add-submit{
    background: none;
    border: none;
    cursor: pointer;
    color: var(--teal);
    font-size: 22px;
    font-weight: 300;
    line-height: 1;
    opacity: 0;
    transition: opacity .15s ease;
    padding: 0 3px;
    flex-shrink: 0;
  }

  /* ===== ASSIGN CONTROL (standalone drafts) ===== */
  .assign-wrap{
    margin-top: 12px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .assign-btn{
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-muted);
    padding: 0;
    transition: color .15s ease;
  }
  .assign-btn:hover{ color: var(--teal); }
  .assign-select{
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 4px 8px;
    color: var(--text);
    background: var(--card);
    outline: none;
    cursor: pointer;
    max-width: 260px;
  }
  .assign-select:focus{ border-color: var(--teal); }
  .assign-select.hidden{ display: none; }

  /* ===== HEADER ACTIONS ===== */
  .header-actions{
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-top: 22px;
    flex-wrap: wrap;
  }
  .header-util-group{
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    padding-left: 16px;
    border-left: 1.5px solid var(--border-soft);
    margin-left: 4px;
  }
  .header-util-btn{
    background: none;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: var(--text-2);
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
  }
  .header-util-btn:hover{ border-color: var(--teal); color: var(--teal); }
  .header-util-btn.danger:hover{ border-color: var(--red); color: var(--red); }

  /* ===== NEW PROJECT PANEL ===== */

/* ===== UTILITIES ===== */
function todayISO(){ return new Date().toISOString().slice(0, 10); }

function formatDate(str){
  if(!str || str === "—") return "—";
  const d = new Date(str + "T00:00:00");
  const m = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
  return `${d.getDate()} ${m[d.getMonth()]}`;
}

function daysAgo(str){
  if(!str) return 999;
  return Math.floor((new Date() - new Date(str + "T00:00:00")) / 86400000);
}

function relativeDate(str){
  if(!str || str === "—") return "—";
  const d = daysAgo(str);
  if(d === 0) return "hoy";
  if(d === 1) return "ayer";
  if(d < 7)  return `hace ${d}d`;
  if(d < 30) return `hace ${Math.floor(d/7)}sem`;
  return `hace ${Math.floor(d/30)}mes`;
}

/* ===== PRIORITY HELPERS ===== */
function getSortedForFilter(filter){
  const projects = getMergedProjects().filter(p =>
    filter === 'all' || getEffectiveStatus(p) === filter
  );
  const order = priorityOrder[filter] || [];
  return [...projects].sort((a, b) => {
    const ai = order.indexOf(a.id);
    const bi = order.indexOf(b.id);
    if(ai === -1 && bi === -1) return 0;
    if(ai === -1) return 1;
    if(bi === -1) return -1;
    return ai - bi;
  });
}

/* ===== RENDER ===== */
let activeFilter = "active";
let searchQuery  = "";

function render(){
  /* preserve open panel IDs across re-renders */
  const openIds = new Set(
    [...document.querySelectorAll('.proj-row.row--open')].map(r => r.dataset.id)
  );

  const main = document.getElementById('mainContent');
  const q    = searchQuery.trim().toLowerCase();

  const filtered = getMergedProjects().filter(p => {
    const mf = activeFilter === "all" || getEffectiveStatus(p) === activeFilter;
    const ms = !q || p.title.toLowerCase().includes(q) || (p.area || '').toLowerCase().includes(q) || p.note.toLowerCase().includes(q);
    return mf && ms;
  }).sort((a, b) => {
    const da = getLastActivity(a);
    const db = getLastActivity(b);
    return db > da ? 1 : db < da ? -1 : 0;
  });

  const filteredLoose = getMergedLoose().filter(item => {
    if(activeFilter !== "all") return false;
    return !q || item.title.toLowerCase().includes(q) || item.note.toLowerCase().includes(q);
  });

  let html = '';
  if(filtered.length === 0 && filteredLoose.length === 0){
    html = `<div class="empty-state">nada por aquí — ajusta el filtro o la búsqueda</div>`;
  } else {
    if(filtered.length > 0){
      html += `<div class="section-label">Proyectos</div><div class="proj-list">`;
      html += filtered.map(p => p.draft ? draftProjectRowHTML(p) : rowHTML(p)).join('');
      html += `</div>`;
    }
    if(filteredLoose.length > 0){
      html += `<div class="section-label">Pendientes sueltos</div><div class="proj-list">`;
      html += filteredLoose.map(looseRowHTML).join('');
      html += `</div>`;
    }
  }

  main.innerHTML = html;

  /* re-open panels that were open before */
  openIds.forEach(id => {
    const row    = document.querySelector(`.proj-row[data-id="${id}"]`);
    const expand = document.getElementById('expand-' + id);
    if(row && expand){
      row.classList.add('row--open');
      row.setAttribute('aria-expanded', 'true');
      expand.classList.add('open');
    }
  });

  document.getElementById('totalCount').textContent =
    `${getMergedProjects().length} proyectos · ${getMergedLoose().length} sueltos`;

  renderPriorities();
}

/* ===== PER-PROJECT QUICK-ADD ===== */
function submitProjectDraft(projectId, text){
  text = text.trim();
  if(!text) return;
  const entry = { id: 'dl-' + Date.now(), date: todayISO(), text, draft: true };
  if(!draftLogs[projectId]) draftLogs[projectId] = [];
  draftLogs[projectId].unshift(entry);
  saveDraftLogs(draftLogs);
  render();
}

/* ===== STANDALONE QUICK-CAPTURE ===== */
function submitStandaloneDraft(text){
  text = text.trim();
  if(!text) return;
  standaloneDrafts.unshift({
    id: 'draft-' + Date.now(),
    title: text.length > 50 ? text.slice(0, 50) + '…' : text,
    note: text,
    added: todayISO(),
    draft: true
  });
  saveStandaloneDrafts(standaloneDrafts);
  render();
  renderStrip();
}

/* ===== ASSIGN STANDALONE DRAFT TO PROJECT ===== */
function assignDraftToProject(itemId, projectId){
  const idx = standaloneDrafts.findIndex(d => d.id === itemId);
  if(idx === -1) return;
  const draft = standaloneDrafts[idx];

  /* move content into project's draftLogs */
  const entry = { date: draft.added, text: draft.note, draft: true };
  if(!draftLogs[projectId]) draftLogs[projectId] = [];
  draftLogs[projectId].unshift(entry);
  saveDraftLogs(draftLogs);

  /* remove from standalone */
  standaloneDrafts.splice(idx, 1);
  saveStandaloneDrafts(standaloneDrafts);

  render();
  renderStrip();
}

/* ===== DELETE PROJECT ===== */
function deleteProject(projectId, isDraft, title){
  if(!confirm(`¿Eliminar "${title}" por completo? Esta acción no se puede deshacer.`)) return;
  if(isDraft){
    const idx = draftProjects.findIndex(p => p.id === projectId);
    if(idx !== -1){ draftProjects.splice(idx, 1); saveDraftProjects(draftProjects); }
  } else {
    /* Deletion of official projects is a local override only — Julian must confirm with Claude
       to actually remove it from PROJECTS via Claude Code, otherwise it reappears if this
       override is ever cleared. */
    if(!deletedOverrides.includes(projectId)){ deletedOverrides.push(projectId); saveDeletedOverrides(deletedOverrides); }
  }
  if(statusOverrides[projectId] !== undefined){ delete statusOverrides[projectId]; saveStatusOverrides(statusOverrides); }
  render();
  renderStrip();
}

/* ===== DRAFT NOTE TOGGLE + DELETE ===== */
function toggleNoteDone(el){
  const context   = el.dataset.context;
  const projectId = el.dataset.projectId;
  const entryId   = el.dataset.entryId;
  let entry;
  if(context === 'project'){
    entry = (draftLogs[projectId] || []).find(e => e.id === entryId);
    if(entry){ entry.done = !entry.done; saveDraftLogs(draftLogs); }
  } else {
    entry = standaloneDrafts.find(e => e.id === entryId);
    if(entry){ entry.done = !entry.done; saveStandaloneDrafts(standaloneDrafts); }
  }
  if(entry) el.classList.toggle('log-text--done', entry.done);
}

function deleteNote(btn){
  if(!confirm('¿Eliminar esta nota? Esta acción no se puede deshacer.')) return;
  const context   = btn.dataset.context;
  const projectId = btn.dataset.projectId;
  const entryId   = btn.dataset.entryId;
  if(context === 'project'){
    const arr = draftLogs[projectId] || [];
    const idx = arr.findIndex(e => e.id === entryId);
    if(idx !== -1){ arr.splice(idx, 1); saveDraftLogs(draftLogs); }
    render();
  } else {
    const idx = standaloneDrafts.findIndex(e => e.id === entryId);
    if(idx !== -1){ standaloneDrafts.splice(idx, 1); saveStandaloneDrafts(standaloneDrafts); }
    render();
    renderStrip();
  }
}

/* ===== INLINE NOTE EDIT ===== */
function editNote(btn){
  const context   = btn.dataset.context;
  const projectId = btn.dataset.projectId || '';
  const entryId   = btn.dataset.entryId;

  let currentText = '';
  if(context === 'project'){
    const entry = (draftLogs[projectId] || []).find(e => e.id === entryId);
    if(!entry) return;
    currentText = entry.text;
  } else {
    const entry = standaloneDrafts.find(e => e.id === entryId);
    if(!entry) return;
    currentText = entry.note;
  }

  const row = btn.closest('.log-draft-row, .standalone-draft-row');
  if(!row) return;

  row.innerHTML = `
    <input type="text" class="log-edit-input"
      data-context="${context}" data-project-id="${projectId}" data-entry-id="${entryId}">
    <button class="log-edit-save-btn" aria-label="Guardar"
      data-context="${context}" data-project-id="${projectId}" data-entry-id="${entryId}">✓</button>
    <button class="log-edit-cancel-btn" aria-label="Cancelar"
      data-context="${context}" data-project-id="${projectId}" data-entry-id="${entryId}">✕</button>`;

  const inp = row.querySelector('.log-edit-input');
  inp.value = currentText;
  inp.focus();
  inp.setSelectionRange(currentText.length, currentText.length);
}

function saveNoteEdit(context, projectId, entryId, newText){
  newText = newText.trim();
  if(!newText){ cancelNoteEdit(context, projectId, entryId); return; }
  if(context === 'project'){
    const entry = (draftLogs[projectId] || []).find(e => e.id === entryId);
    if(entry){ entry.text = newText; saveDraftLogs(draftLogs); }
    render();
  } else {
    const entry = standaloneDrafts.find(e => e.id === entryId);
    if(entry){
      entry.note  = newText;
      entry.title = newText.length > 50 ? newText.slice(0, 50) + '…' : newText;
      saveStandaloneDrafts(standaloneDrafts);
    }
    render();
    renderStrip();
  }
}

function cancelNoteEdit(context, projectId, entryId){
  if(context === 'project'){
    render();
  } else {
    render();
    renderStrip();
  }
}

      getMergedProjects().filter(p => getEffectiveStatus(p) === 'active')
              .map(p => `<option value="${p.id}">${p.title}</option>`).join('');
  }

  function openUpdatePanel(){
    populateUpdateSelect();
    document.getElementById('updateBtn').style.display = 'none';
    document.getElementById('updatePicker').classList.remove('hidden');
    document.getElementById('updateSelect').value = '';
    document.getElementById('updateInputWrap').classList.add('hidden');
    document.getElementById('updateInput').value = '';
    document.getElementById('updateSaveBtn').classList.add('hidden');
    document.getElementById('updateConfirm').classList.add('hidden');
    currentProjectId = null;
  }

  function closeUpdatePanel(){
    clearTimeout(confirmTimer);
    document.getElementById('updateBtn').style.display = '';
    document.getElementById('updatePicker').classList.add('hidden');
    document.getElementById('updateSelect').value = '';
    document.getElementById('updateInputWrap').classList.add('hidden');
    document.getElementById('updateInput').value = '';
    document.getElementById('updateSaveBtn').classList.add('hidden');
    document.getElementById('updateConfirm').classList.add('hidden');
    currentProjectId = null;
  }

  function saveHeaderUpdate(){
    const text = document.getElementById('updateInput').value.trim();
    if(!text || !currentProjectId) return;

    const savedId = currentProjectId;
    submitProjectDraft(savedId, text);

    /* auto-expand the row if collapsed, scroll into view if off-screen */
    const row = document.querySelector(`.proj-row[data-id="${savedId}"]`);
    if(row && !row.classList.contains('row--open')){
      toggleRow(row);
      const rect = row.getBoundingClientRect();
      const inView = rect.top >= 0 && rect.bottom <= window.innerHeight;
      if(!inView) row.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }

    const project = getMergedProjects().find(p => p.id === savedId);
    const confirm = document.getElementById('updateConfirm');
    confirm.textContent = `Agregado a ${project.title} ✓`;
    confirm.classList.remove('hidden');
    document.getElementById('updateInputWrap').classList.add('hidden');
    document.getElementById('updateSelect').value = '';
    currentProjectId = null;

    confirmTimer = setTimeout(closeUpdatePanel, 1500);
  }

  document.getElementById('updateBtn').addEventListener('click', e => {
    e.stopPropagation();
    openUpdatePanel();
  });

  document.getElementById('updateSelect').addEventListener('change', e => {
    const id = e.target.value;
    if(!id){ document.getElementById('updateInputWrap').classList.add('hidden'); currentProjectId = null; return; }
    currentProjectId = id;
    const project = getMergedProjects().find(p => p.id === id);
    const inp = document.getElementById('updateInput');
    inp.placeholder = `¿Qué pasó en ${project.title}?...`;
    inp.value = '';
    document.getElementById('updateSaveBtn').classList.add('hidden');
    document.getElementById('updateInputWrap').classList.remove('hidden');
    inp.focus();
  });

  document.getElementById('updateInput').addEventListener('input', e => {
    document.getElementById('updateSaveBtn').classList.toggle('hidden', !e.target.value.trim());
  });

  document.getElementById('updateInput').addEventListener('keydown', e => {
    if(e.key === 'Enter'){ e.preventDefault(); saveHeaderUpdate(); }
    if(e.key === 'Escape'){ closeUpdatePanel(); }
  });

  document.getElementById('updateSelect').addEventListener('keydown', e => {
    if(e.key === 'Escape') closeUpdatePanel();
  });

  document.getElementById('updateSaveBtn').addEventListener('click', saveHeaderUpdate);

  /* click outside collapses */
  document.addEventListener('click', e => {
    const panel  = document.getElementById('updatePanel');
    const picker = document.getElementById('updatePicker');
    if(!picker.classList.contains('hidden') && !panel.contains(e.target)) closeUpdatePanel();
  });

  /* stop clicks inside the panel from bubbling to document */
  document.getElementById('updatePanel').addEventListener('click', e => e.stopPropagation());
})();

/* ===== EXPORT + CLEAR DRAFTS ===== */
function exportDrafts(){
  const lines = [];

  const projectsWithDrafts = getMergedProjects().filter(p => !p.draft && draftLogs[p.id] && draftLogs[p.id].length > 0);
  if(projectsWithDrafts.length > 0){
    lines.push('## Actualizaciones de proyectos', '');
    projectsWithDrafts.forEach(p => {
      lines.push(`### ${p.title}`);
      draftLogs[p.id].forEach(e => lines.push(`- ${e.done ? '[RESUELTO] ' : ''}${e.date}: ${e.text}`));
      lines.push('');
    });
  }

  if(standaloneDrafts.length > 0){
    lines.push('## Notas sueltas', '');
    standaloneDrafts.forEach(item => lines.push(`- ${item.added}: ${item.note}`));
    lines.push('');
  }

  if(draftProjects.length > 0){
    lines.push('## Proyectos nuevos (sin formalizar)', '');
    draftProjects.forEach(p => lines.push(`- ${p.title}: ${p.note} (agregado ${p.added})`));
    lines.push('');
  }

  const statusOverrideKeys = Object.keys(statusOverrides);
  if(statusOverrideKeys.length > 0){
    lines.push('## Cambios de estado pendientes de formalizar', '');
    statusOverrideKeys.forEach(id => {
      const project = [...PROJECTS, ...draftProjects].find(p => p.id === id);
      if(project) lines.push(`- ${project.title}: movido a ${statusOverrides[id]} (antes: ${project.status})`);
    });
    lines.push('');
  }

  if(deletedOverrides.length > 0){
    lines.push('## Proyectos marcados para eliminar', '');
    deletedOverrides.forEach(id => {
      const project = PROJECTS.find(p => p.id === id);
      if(project) lines.push(`- ${project.title}: eliminar de PROJECTS por completo`);
    });
    lines.push('');
  }

  const btn = document.getElementById('exportDraftsBtn');
  if(lines.length === 0){
    btn.textContent = 'Sin borradores ✓';
    setTimeout(() => { btn.textContent = 'Exportar borradores'; }, 1500);
    return;
  }
  navigator.clipboard.writeText(lines.join('\n')).catch(() => {});
  btn.textContent = 'Copiado ✓';
  setTimeout(() => { btn.textContent = 'Exportar borradores'; }, 1500);
}

function clearDrafts(){
  if(!confirm('¿Borrar todos los borradores? Esta acción no se puede deshacer.')) return;
  draftLogs        = {};
  standaloneDrafts = [];
  draftProjects    = [];
  deletedOverrides = [];
  statusOverrides  = {};
  saveDraftLogs(draftLogs);
  saveStandaloneDrafts(standaloneDrafts);
  saveDraftProjects(draftProjects);
  saveDeletedOverrides(deletedOverrides);
  saveStatusOverrides(statusOverrides);
  render();
  renderStrip();
}

document.getElementById('loadBackupBtn').addEventListener('click', () => {
  document.getElementById('backupFileInput').value = '';
  document.getElementById('backupFileInput').click();
});

document.getElementById('backupFileInput').addEventListener('change', e => {
  const file = e.target.files[0];
  if(!file) return;
  const msgEl = document.getElementById('backupMsg');
  const reader = new FileReader();
  reader.onload = ev => {
    let data;
    try { data = JSON.parse(ev.target.result); } catch { showBackupMsg('Archivo no válido'); return; }

    /* validate shape */
    if(typeof data !== 'object' || !data ||
       typeof data.draftLogs !== 'object' ||
       !Array.isArray(data.standaloneDrafts) ||
       !Array.isArray(data.draftProjects) ||
       typeof data.statusOverrides !== 'object' ||
       !Array.isArray(data.deletedOverrides)){
      showBackupMsg('Archivo no válido');
      return;
    }

    let addedNotes = 0, addedProjects = 0;

    /* merge draftLogs */
    Object.keys(data.draftLogs || {}).forEach(pid => {
      if(!draftLogs[pid]) draftLogs[pid] = [];
      (data.draftLogs[pid] || []).forEach(entry => {
        const exists = draftLogs[pid].some(e => e.date === entry.date && e.text === entry.text);
        if(!exists){ draftLogs[pid].push(entry); addedNotes++; }
      });
      draftLogs[pid].sort((a, b) => (b.date > a.date ? 1 : b.date < a.date ? -1 : 0));
    });
    saveDraftLogs(draftLogs);

    /* merge standaloneDrafts */
    (data.standaloneDrafts || []).forEach(item => {
      const exists = standaloneDrafts.some(e => e.added === item.added && e.note === item.note);
      if(!exists){ standaloneDrafts.push(item); addedNotes++; }
    });
    saveStandaloneDrafts(standaloneDrafts);

    /* merge draftProjects — dedupe by title (case-insensitive) */
    (data.draftProjects || []).forEach(p => {
      const titleNorm = (p.title || '').trim().toLowerCase();
      const exists = draftProjects.some(e => (e.title || '').trim().toLowerCase() === titleNorm);
      if(!exists){ draftProjects.push(p); addedProjects++; }
    });
    saveDraftProjects(draftProjects);

    /* merge statusOverrides — imported wins on conflict */
    statusOverrides = Object.assign({}, statusOverrides, data.statusOverrides || {});
    saveStatusOverrides(statusOverrides);

    /* merge deletedOverrides — union */
    (data.deletedOverrides || []).forEach(id => {
      if(!deletedOverrides.includes(id)) deletedOverrides.push(id);
    });
    saveDeletedOverrides(deletedOverrides);

    render();
    renderStrip();
    showBackupMsg(`Backup cargado — ${addedNotes} notas, ${addedProjects} proyectos borrador fusionados`);
  };
  reader.readAsText(file);
});

function showBackupMsg(text){
  const el = document.getElementById('backupMsg');
  el.textContent = text;
  el.style.display = '';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}

  });

  prioBody.addEventListener('dragend', e => {
    const item = e.target.closest('.prio-item');
    if(item) item.classList.remove('prio-dragging');
    prioBody.querySelectorAll('.prio-item').forEach(i => i.classList.remove('prio-drag-over'));
    dragId = null;
  });

  prioBody.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    const item = e.target.closest('.prio-item');
    prioBody.querySelectorAll('.prio-item').forEach(i => i.classList.remove('prio-drag-over'));
    if(item) item.classList.add('prio-drag-over');
  });

  prioBody.addEventListener('dragleave', e => {
    if(!prioBody.contains(e.relatedTarget)){
      prioBody.querySelectorAll('.prio-item').forEach(i => i.classList.remove('prio-drag-over'));
    }
  });

  prioBody.addEventListener('drop', e => {
    e.preventDefault();
    prioBody.querySelectorAll('.prio-item').forEach(i => i.classList.remove('prio-drag-over'));
    const target = e.target.closest('.prio-item');
    if(!target || !dragId || dragId === target.dataset.prioId) return;

    const sorted  = getSortedForFilter(activeFilter);
    const ids     = sorted.map(p => p.id);
    const fromIdx = ids.indexOf(dragId);
    const toIdx   = ids.indexOf(target.dataset.prioId);
    if(fromIdx === -1 || toIdx === -1) return;
    ids.splice(fromIdx, 1);
    ids.splice(toIdx, 0, dragId);
    priorityOrder[activeFilter] = ids;
    savePriorityOrder(priorityOrder);
    renderPriorities();
  });

  /* ---- click a title → scroll + flash in main list ---- */
  prioBody.addEventListener('click', e => {
    const name = e.target.closest('.prio-name');
    if(!name) return;
    const id      = name.dataset.prioId;
    const projRow = document.querySelector(`.proj-row[data-id="${id}"]`);
    if(!projRow) return;
    projRow.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    projRow.classList.remove('proj-row--flash');
    void projRow.offsetWidth; /* force reflow so animation restarts */
    projRow.classList.add('proj-row--flash');
    setTimeout(() => projRow.classList.remove('proj-row--flash'), 900);
  });

  applyPanelState();
})();

renderStrip();
render();

/* ===== THEME TOGGLE ===== */
(function(){
  const btn = document.getElementById('themeToggle');
  function applyTheme(dark){
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    btn.textContent = dark ? '☀️' : '🌙';
    btn.setAttribute('aria-label', dark ? 'Modo claro' : 'Modo oscuro');
  }
  btn.addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    localStorage.setItem('hlna_home_theme', isDark ? 'light' : 'dark');
    applyTheme(!isDark);
  });
  applyTheme(document.documentElement.getAttribute('data-theme') === 'dark');
})();
</script>
